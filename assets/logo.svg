<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="f2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8FA3"/>
      <stop offset="100%" stop-color="#E84393"/>
    </linearGradient>
    <linearGradient id="f3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="50%" stop-color="#E8315A"/>
      <stop offset="100%" stop-color="#A01840"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#E8315A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#ffffff"/>

  <!-- Hex cluster icon -->
  <g filter="url(#shadow)">
    <polygon points="310,60 360,89 360,147 310,176 260,147 260,89" fill="url(#f1)"/>
    <polygon points="370,60 420,89 420,147 370,176 320,147 320,89" fill="url(#f2)"/>
    <polygon points="340,118 390,147 390,205 340,234 290,205 290,147" fill="url(#f3)"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="302" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="52"
    font-weight="700"
    fill="#E8315A"
    letter-spacing="8">BRIX</text>

  <!-- Tagline -->
  <text x="340" y="330" text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#888888"
    letter-spacing="3">SYSTEMS PROGRAMMING LANGUAGE</text>

  <!-- Divider -->
  <line x1="200" y1="346" x2="480" y2="346" stroke="#E8315A" stroke-width="0.75" opacity="0.4"/>
</svg>
